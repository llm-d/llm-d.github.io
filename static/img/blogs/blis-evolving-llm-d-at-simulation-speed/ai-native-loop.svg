<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 530" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7C3AED"/>
    </marker>
    <marker id="arr-dark" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#5B21B6"/>
    </marker>
  </defs>

  <rect width="840" height="530" fill="white"/>

  <!-- Outer loop region -->
  <rect x="60" y="20" width="750" height="490" rx="2" fill="#FAF5FF" stroke="#5B21B6" stroke-width="2"/>
  <text x="435" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Outer loop — real llm-d cluster</text>

  <!-- Inner loop region (nested) -->
  <rect x="90" y="65" width="690" height="215" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="435" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#7C3AED">Inner loop — BLIS (fast, local)</text>

  <!-- Box 1: Workload traces   x=115 y=100 w=160 h=90   center=(195,145)   right=275 -->
  <rect x="115" y="100" width="160" height="90" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="195" y="141" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Workload traces</text>
  <text x="195" y="161" text-anchor="middle" font-size="12" fill="#555">+ policy candidates</text>

  <!-- Arrow: Box1 right (275,145) → Box2 left (340,145) -->
  <line x1="275" y1="145" x2="340" y2="145" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: BLIS evaluation   x=350 y=100 w=160 h=90   center=(430,145)   right=510 -->
  <rect x="350" y="100" width="160" height="90" rx="2" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <text x="430" y="141" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">BLIS evaluation</text>
  <text x="430" y="161" text-anchor="middle" font-size="12" fill="#555">batch sweep on CPU</text>

  <!-- Arrow: Box2 right (510,145) → Box3 left (575,145) -->
  <line x1="510" y1="145" x2="575" y2="145" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Ranked candidates   x=585 y=100 w=160 h=90   center=(665,145)   bottom=190 -->
  <rect x="585" y="100" width="160" height="90" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="665" y="141" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Ranked candidates</text>
  <text x="665" y="161" text-anchor="middle" font-size="12" fill="#555">filtered by SLO</text>

  <!-- Refine loop: Box3 bottom (665,190) → down to 240 → left to (430,240) → up to Box2 bottom (430,190) -->
  <path d="M 665 190 L 665 240 L 430 240 L 430 200" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="548" y="257" text-anchor="middle" font-size="11" font-style="italic" fill="#7C3AED">refine policies</text>

  <!-- Arrow: inner loop bottom (435,280) → down to Box4 top (435,340) -->
  <line x1="435" y1="280" x2="435" y2="340" stroke="#5B21B6" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="465" y="315" text-anchor="start" font-size="11" font-style="italic" fill="#5B21B6">best candidates</text>

  <!-- Box 4: Cluster validation   x=350 y=340 w=160 h=90   center=(430,385)   right=510 -->
  <rect x="350" y="340" width="160" height="90" rx="2" fill="#EDE5FF" stroke="#5B21B6" stroke-width="2"/>
  <text x="430" y="381" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Cluster validation</text>
  <text x="430" y="401" text-anchor="middle" font-size="12" fill="#555">real llm-d + GPUs</text>

  <!-- Arrow: Box4 right (510,385) → Box5 left (585,385) -->
  <line x1="510" y1="385" x2="585" y2="385" stroke="#5B21B6" stroke-width="1.5" marker-end="url(#arr-dark)"/>

  <!-- Box 5: Upstream contribution   x=595 y=340 w=160 h=90   center=(675,385) -->
  <rect x="595" y="340" width="160" height="90" rx="2" fill="#EDE5FF" stroke="#5B21B6" stroke-width="1.5"/>
  <text x="675" y="381" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Upstream contribution</text>
  <text x="675" y="401" text-anchor="middle" font-size="12" fill="#555">router, scorer, policy</text>

  <!-- Calibrate arrow: Box4 left (350,385) → left to (30,385) → up to (30,145) → right to Box1 left (115,145) -->
  <path d="M 350 385 L 30 385 L 30 145 L 115 145" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <text x="24" y="275" text-anchor="middle" font-size="12" font-style="italic" fill="#7C3AED" transform="rotate(-90, 24, 275)">calibrate BLIS</text>
</svg>
