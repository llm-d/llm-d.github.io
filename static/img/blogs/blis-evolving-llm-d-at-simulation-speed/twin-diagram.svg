<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#7C3AED"/>
    </marker>
  </defs>

  <rect width="820" height="380" fill="white"/>

  <!-- === Inputs column (left) === -->
  <text x="75" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">Inputs</text>

  <rect x="10" y="40" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="75" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Workload traces</text>

  <rect x="10" y="100" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="75" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Hardware specs</text>
  <text x="75" y="138" text-anchor="middle" font-size="10" fill="#555">GPU, model arch</text>

  <rect x="10" y="160" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="75" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Topology</text>
  <text x="75" y="198" text-anchor="middle" font-size="10" fill="#555">instances, P/D split</text>

  <rect x="10" y="220" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="75" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Policies</text>
  <text x="75" y="258" text-anchor="middle" font-size="10" fill="#555">routing, admission</text>

  <rect x="10" y="280" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="75" y="302" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">vLLM config</text>
  <text x="75" y="318" text-anchor="middle" font-size="10" fill="#555">TP, chunk, batch</text>

  <!-- Arrows: inputs → simulator -->
  <line x1="140" y1="65" x2="195" y2="175" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="140" y1="125" x2="195" y2="175" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="140" y1="185" x2="195" y2="185" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="140" y1="245" x2="195" y2="195" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="140" y1="305" x2="195" y2="205" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>

  <!-- === Simulator core (center) === -->
  <rect x="205" y="35" width="420" height="310" rx="2" fill="#FAF5FF" stroke="#5B21B6" stroke-width="2"/>
  <text x="415" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">BLIS — discrete-event simulator</text>

  <!-- Internal blocks: top row -->
  <rect x="225" y="80" width="120" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="285" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">Event queue</text>

  <rect x="360" y="80" width="120" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="420" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">Admission</text>

  <rect x="495" y="80" width="120" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="555" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">Router / scorer</text>

  <!-- Internal blocks: middle row -->
  <rect x="225" y="145" width="120" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="285" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">Latency model</text>
  <text x="285" y="179" text-anchor="middle" font-size="10" fill="#555">roofline / physics</text>

  <rect x="360" y="145" width="120" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="420" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">KV cache</text>
  <text x="420" y="179" text-anchor="middle" font-size="10" fill="#555">manager</text>

  <rect x="495" y="145" width="120" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="555" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">Batch formation</text>
  <text x="555" y="179" text-anchor="middle" font-size="10" fill="#555">FCFS + preemption</text>

  <!-- Internal blocks: bottom row -->
  <rect x="225" y="210" width="185" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="317" y="237" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">P/D transfer model</text>

  <rect x="425" y="210" width="190" height="45" rx="2" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="520" y="237" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">Autoscaler model</text>

  <!-- Calibration label -->
  <rect x="225" y="275" width="390" height="45" rx="2" fill="#EDE5FF" stroke="#5B21B6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="302" text-anchor="middle" font-size="11" font-style="italic" fill="#5B21B6">Calibration layer — roofline / trained-physics coefficients</text>

  <!-- Arrows: simulator → outputs -->
  <line x1="625" y1="175" x2="670" y2="65" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="625" y1="185" x2="670" y2="125" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="625" y1="190" x2="670" y2="185" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="625" y1="195" x2="670" y2="245" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="625" y1="205" x2="670" y2="305" stroke="#7C3AED" stroke-width="1" marker-end="url(#arr)"/>

  <!-- === Outputs column (right) === -->
  <text x="745" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">Outputs</text>

  <rect x="680" y="40" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="745" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">TTFT / ITL</text>
  <text x="745" y="78" text-anchor="middle" font-size="10" fill="#555">latency distributions</text>

  <rect x="680" y="100" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="745" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Throughput</text>
  <text x="745" y="138" text-anchor="middle" font-size="10" fill="#555">tokens/s, QPS</text>

  <rect x="680" y="160" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="745" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">SLO violations</text>
  <text x="745" y="198" text-anchor="middle" font-size="10" fill="#555">per policy</text>

  <rect x="680" y="220" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="745" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Queue depth</text>
  <text x="745" y="258" text-anchor="middle" font-size="10" fill="#555">saturation, shed</text>

  <rect x="680" y="280" width="130" height="50" rx="2" fill="#F3EEFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="745" y="302" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">Policy rankings</text>
  <text x="745" y="318" text-anchor="middle" font-size="10" fill="#555">candidate configs</text>
</svg>
