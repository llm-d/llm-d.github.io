<svg version="1.1" viewBox="0.0 0.0 576.0 288.0"
     fill="none" stroke="none" stroke-linecap="square" stroke-miterlimit="10"
     xmlns="http://www.w3.org/2000/svg">

  <!-- background -->
  <rect x="0" y="0" width="576" height="288" fill="#ffffff"/>

  <!-- Ray Cluster outer panel -->
  <rect x="14" y="22" width="548" height="132" fill="#efefef" stroke="#9f659f" stroke-width="3.3070866141732282"/>

  <!-- Ray Cluster title (rendered above the panel) -->
  <rect x="220" y="10" width="136" height="22" fill="#ffffff" stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <text x="288" y="26" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="13"
        fill="#000000" font-weight="bold">Ray Cluster</text>

  <!-- Head Node -->
  <rect x="34" y="46" width="140" height="92" fill="#ffffff"
        stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <text x="104" y="64" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="12"
        fill="#000000" font-weight="bold">Head Node</text>

  <!-- Envoy small box inside Head Node -->
  <rect x="43" y="80" width="58" height="46" fill="#ffffff"
        stroke="#9f659f" stroke-width="0.8267716535433071"/>
  <text x="72" y="107" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="11"
        fill="#000000">Envoy</text>

  <!-- llm-d EPP small box inside Head Node -->
  <rect x="107" y="80" width="58" height="46" fill="#ffffff"
        stroke="#9f659f" stroke-width="0.8267716535433071"/>
  <text x="136" y="103" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="10"
        fill="#000000">llm-d</text>
  <text x="136" y="116" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="10"
        fill="#000000">EPP</text>

  <!-- Worker Node 1 -->
  <rect x="204" y="46" width="160" height="92" fill="#ffffff"
        stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <text x="284" y="64" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="12"
        fill="#000000" font-weight="bold">Worker Node</text>
  <rect x="226" y="80" width="116" height="46" fill="#ffffff"
        stroke="#9f659f" stroke-width="0.8267716535433071"/>
  <text x="284" y="100" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="11"
        fill="#000000">vLLM</text>
  <text x="284" y="116" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="9"
        fill="#000000" font-style="italic">10.0.0.10:8000</text>

  <!-- Worker Node 2 -->
  <rect x="394" y="46" width="160" height="92" fill="#ffffff"
        stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <text x="474" y="64" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="12"
        fill="#000000" font-weight="bold">Worker Node</text>
  <rect x="416" y="80" width="116" height="46" fill="#ffffff"
        stroke="#9f659f" stroke-width="0.8267716535433071"/>
  <text x="474" y="100" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="11"
        fill="#000000">vLLM</text>
  <text x="474" y="116" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="9"
        fill="#000000" font-style="italic">10.0.0.11:8000</text>

  <!-- Ray-internal control connections (head <-> workers) -->
  <line x1="174" y1="92" x2="204" y2="92"
        stroke="#9f659f" stroke-width="0.8267716535433071"
        stroke-dasharray="3,2"/>
  <line x1="364" y1="92" x2="394" y2="92"
        stroke="#9f659f" stroke-width="0.8267716535433071"
        stroke-dasharray="3,2"/>

  <!-- Connection: Head Node -> Endpoint Generator -->
  <line x1="104" y1="154" x2="104" y2="200"
        stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <polygon points="100,194 104,206 108,194"
           fill="#9f659f" stroke="#9f659f" stroke-width="0.5"/>
  <text x="112" y="180"
        font-family="Helvetica, Arial, sans-serif" font-size="10"
        fill="#000000" font-style="italic">ray.nodes()</text>

  <!-- Endpoint Generator (highlighted) -->
  <rect x="20" y="206" width="200" height="62"
        fill="#d9d2e9" stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <text x="120" y="226" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="12"
        fill="#000000" font-weight="bold">Endpoint Generator</text>
  <text x="120" y="244" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="10"
        fill="#000000">generate_epp_endpoints.py</text>
  <text x="120" y="260" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="9"
        fill="#000000" font-style="italic">resolves IPs, writes YAML</text>

  <!-- Connection: Endpoint Generator -> endpoints.yaml -->
  <line x1="220" y1="237" x2="394" y2="237"
        stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <polygon points="388,233 400,237 388,241"
           fill="#9f659f" stroke="#9f659f" stroke-width="0.5"/>
  <text x="307" y="232" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="10"
        fill="#000000" font-style="italic">writes</text>

  <!-- endpoints.yaml -->
  <rect x="400" y="216" width="160" height="44"
        fill="#d9d2e9" stroke="#9f659f" stroke-width="1.6535433070866141"/>
  <text x="480" y="244" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="13"
        fill="#000000" font-weight="bold">endpoints.yaml</text>

  <!-- Dashed connector: endpoints.yaml -> llm-d EPP (file-discovery read) -->
  <path d="M 165 103 L 188 103 L 188 180 L 480 180 L 480 216"
        fill="none" stroke="#9f659f" stroke-width="1.6535433070866141"
        stroke-dasharray="5,3"/>
  <polygon points="165,103 173,99 173,107"
           fill="#9f659f" stroke="#9f659f" stroke-width="0.5"/>
  <text x="335" y="176" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="10"
        fill="#000000" font-style="italic">file-discovery</text>

</svg>
