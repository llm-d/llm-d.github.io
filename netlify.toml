[build]
  command = "npm run build:all"
  publish = "build"

# Redirect old /preview/* to /docs/* (backward compatibility)
[[redirects]]
  from = "/preview/*"
  to = "/docs/:splat"
  status = 301

# SPA redirect for /docs/* routes
[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200

[[redirects]]
  from = "/docs/*"
  to = "/docs/index.html"
  status = 200
