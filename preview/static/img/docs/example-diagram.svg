<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7b2d8e"/>
    </marker>
  </defs>

  <!-- Background - pure white -->
  <rect width="700" height="340" rx="8" fill="#ffffff"/>

  <!-- Title -->
  <text x="350" y="38" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Request Flow Example</text>

  <!-- GET request arrow -->
  <text x="250" y="72" text-anchor="middle" font-size="13" fill="#7b2d8e">GET /completions</text>
  <line x1="250" y1="78" x2="250" y2="105" stroke="#7b2d8e" stroke-width="2" marker-end="url(#arrow-light)"/>

  <!-- Gateway box (primary style) -->
  <rect x="175" y="108" width="150" height="44" rx="6" fill="#f5f0f7" stroke="#7b2d8e" stroke-width="2"/>
  <text x="250" y="136" text-anchor="middle" font-weight="500" font-size="15" fill="#561f63">Gateway</text>

  <!-- Gateway to EPP arrows -->
  <line x1="325" y1="124" x2="440" y2="124" stroke="#7b2d8e" stroke-width="2" marker-end="url(#arrow-light)"/>
  <text x="383" y="118" text-anchor="middle" font-size="11" fill="#7b2d8e">Prompt</text>
  <line x1="440" y1="138" x2="325" y2="138" stroke="#7b2d8e" stroke-width="2" marker-end="url(#arrow-light)"/>
  <text x="383" y="162" text-anchor="middle" font-size="11" fill="#7b2d8e">Pod A</text>

  <!-- EPP box (accent style) -->
  <rect x="440" y="108" width="110" height="44" rx="6" fill="#e8dced" stroke="#7b2d8e" stroke-width="2"/>
  <text x="495" y="136" text-anchor="middle" font-weight="700" font-size="16" fill="#561f63">EPP</text>

  <!-- Decision label -->
  <text x="495" y="178" text-anchor="middle" font-size="13" fill="#682678" font-style="italic">"A has cache hit"</text>

  <!-- Arrow to Pod A -->
  <line x1="210" y1="152" x2="140" y2="205" stroke="#7b2d8e" stroke-width="2" marker-end="url(#arrow-light)"/>

  <!-- vLLM pods (primary style) -->
  <rect x="60" y="208" width="145" height="46" rx="6" fill="#f5f0f7" stroke="#7b2d8e" stroke-width="2"/>
  <text x="133" y="237" text-anchor="middle" font-weight="600" font-size="15" fill="#561f63">vLLM</text>
  <text x="133" y="272" text-anchor="middle" font-size="12" fill="#7b2d8e">Pod A</text>

  <rect x="225" y="208" width="145" height="46" rx="6" fill="#f5f0f7" stroke="#7b2d8e" stroke-width="2"/>
  <text x="298" y="237" text-anchor="middle" font-weight="600" font-size="15" fill="#561f63">vLLM</text>
  <text x="298" y="272" text-anchor="middle" font-size="12" fill="#7b2d8e">Pod B</text>

  <rect x="390" y="208" width="145" height="46" rx="6" fill="#f5f0f7" stroke="#7b2d8e" stroke-width="2"/>
  <text x="463" y="237" text-anchor="middle" font-weight="600" font-size="15" fill="#561f63">vLLM</text>
  <text x="463" y="272" text-anchor="middle" font-size="12" fill="#7b2d8e">Pod C</text>

  <!-- Caption -->
  <text x="350" y="315" text-anchor="middle" font-size="13" fill="#9b75ad">Dramatically increase prefix-cache hit rate</text>
</svg>
