name: Test deployment

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-llmd-site
        with:
          npm-command: npm install

      - name: Build site and check links (llmd-site ci)
        run: ./bin/llmd-site ci main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add broken links to job summary
        if: always()
        run: |
          if [ -f broken-links-report.md ]; then
            cat broken-links-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Link check failed - no report generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload broken links report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: broken-links-report
          path: broken-links-report.md
          if-no-files-found: ignore
