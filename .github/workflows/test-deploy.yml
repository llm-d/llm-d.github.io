name: Test deployment

on:
  pull_request:
     branches: [ "main" ]
    # Review gh actions docs if you want to further define triggers, paths, etc
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#on

jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.18.1
          cache: npm

      - name: Install dependencies
        run: npm install
      - name: Test build website
        run: npm run build

      - name: Sync preview docs from llm-d/llm-d
        run: cd preview && bash scripts/sync-docs.sh main

      - name: Install preview docs dependencies
        run: cd preview && npm install
      - name: Test build preview docs
        run: cd preview && npm run build
      - name: Merge preview into main build as /docs
        run: |
          cp -r preview/build build/docs
          mkdir -p build/img/docs
          cp -r preview/build/img/docs/* build/img/docs/

      - name: Check links
        run: npm run check-links

      - name: Upload broken links report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-links-report
          path: broken-links-report.md
          if-no-files-found: ignore

      - name: Post broken links report to PR
        if: always() && github.event_name == 'pull_request' && hashFiles('broken-links-report.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if comment already exists
          COMMENT_ID=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json comments --jq '.comments[] | select(.body | startswith("<!-- broken-links-report -->")) | .id' \
            | head -1)

          # Prepare comment body with marker
          COMMENT_BODY="<!-- broken-links-report -->
          $(cat broken-links-report.md)"

          if [ -n "$COMMENT_ID" ]; then
            # Update existing comment
            echo "Updating existing comment ID: $COMMENT_ID"
            gh api -X PATCH "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -f body="$COMMENT_BODY"
          else
            # Create new comment
            echo "Creating new comment"
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "$COMMENT_BODY"
          fi
