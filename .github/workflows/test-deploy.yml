name: Test deployment

on:
  pull_request:
     branches: [ "main" ]
    # Review gh actions docs if you want to further define triggers, paths, etc
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#on

jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20.18.1
          cache: npm

      - name: Install dependencies
        run: npm install
      - name: Test build website
        run: npm run build
      - name: Merge in-flight docs PRs from llm-d/llm-d
        env:
          GH_TOKEN: ${{ github.token }}
        run: cd preview && bash scripts/merge-docs-prs.sh /tmp/llmd-merged

      - name: Sync preview docs (main + merged PRs)
        env:
          LLMD_REPO: /tmp/llmd-merged
        run: cd preview && bash scripts/sync-docs.sh main

      - name: Install preview docs dependencies
        run: cd preview && npm install
      - name: Test build preview docs
        run: cd preview && npm run build
