name: Image Verification on Pull Request

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

jobs:
  image-verification:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-llmd-site
        with:
          npm-command: npm ci

      - name: Build main site
        run: npm run build

      - name: Verify images (llmd-site check images)
        run: ./bin/llmd-site check images
